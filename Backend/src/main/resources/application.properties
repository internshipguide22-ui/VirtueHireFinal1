# ---------------- Server Configuration ----------------
server.port=8081
server.servlet.session.timeout=1h
server.servlet.session.cookie.same-site=none
server.servlet.session.cookie.secure=true


# ---------------- Database Configuration ----------------
spring.datasource.url=jdbc:mysql://localhost:3306/virtuehire?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


# ---------------- JPA / Hibernate ----------------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE


# ---------------- File Upload Configuration ----------------
file.upload-dir=C:/Users/User/Desktop/FINAL-MOCK/FINAL-MOCK v3/Backend/uploads
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB


# ---------------- Thymeleaf ----------------
spring.thymeleaf.cache=false


# ---------------- Custom App Properties ----------------
assessment.pass.percent=75

# ---------------- Jackson JSON Configuration ----------------
spring.jackson.property-naming-strategy=LOWER_CAMEL_CASE


# ---------------- Logging ----------------
logging.level.org.hibernate.SQL=ERROR
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=ERROR
logging.level.org.springframework=INFO
logging.level.com.virtuehire=INFO


# ---------------- Mail Configuration ----------------
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# SSL / TLS FIXES
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
spring.mail.properties.mail.smtp.ssl.protocols=TLSv1.2
spring.mail.properties.mail.smtp.ssl.checkserveridentity=false


# ---------------- Judge0 Configuration ----------------
# Local instance (default - no API key needed)
judge0.base-url=http://localhost:2358
# judge0.api-key=

# For RapidAPI cloud instance (uncomment and add your API key):
# judge0.base-url=https://judge0-ce.p.rapidapi.com
